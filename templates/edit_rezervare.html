<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Editare Rezervare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("{{ url_for('static', filename = 'poza restaurant4 unsplash.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh; 
        }
        
        .table-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            justify-items: center;
        }
        
        .table-option input[type="radio"] {
            display: none; 
        }
        
        .table-label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background-color: #f8f9fa;
            border: 2px solid #6c757d;
            border-radius: 50%; 
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease-in-out;
        }
        
        .table-option input[type="radio"]:checked + .table-label {
            background-color: #ffc107;
            color: black;
            border-color: #e0a800;
            transform: scale(1.15);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .table-label:hover { background-color: #e2e6ea; }
    </style>
</head>
<body class="bg-light">
    
    <div class="container mt-4 mb-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4 text-warning" style="text-shadow: 1px 1px 2px black;">Editează Rezervarea</h3>

                        {% if eroare %}
                            <div class="alert alert-danger text-center">
                                {{eroare}}
                            </div>
                        {% endif %}
                        
                        <form method="POST" action="/edit_rezervare/{{ rezervare.id_rezervare }}">
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="data" class="form-label">Data rezervării</label>
                                    <input type="date" class="form-control" id="data" name="data" value="{{ rezervare.data }}" required>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label for="ora" class="form-label">Ora rezervării</label>
                                    <input type="time" class="form-control" id="ora" name="ora" step="1800" value="{{ rezervare.ora }}" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="numar_persoane" class="form-label">Numărul de persoane</label>
                                <input type="number" class="form-control" id="numar_persoane" name="numar_persoane" min="1" max="15" value="{{ rezervare.numar_persoane }}" required>
                            </div>
                            
                            <div class="mb-4 p-3 border rounded bg-light">
                                <label class="form-label d-block text-center fw-bold mb-3">Schimbă Masa (1-10)</label>
                                <div class="table-grid">
                                    {% for i in range(1, 11) %}
                                    <div class="table-option">
                                        <input type="radio" name="numar_masa" id="masa{{i}}" value="{{i}}" {% if i == rezervare.numar_masa %}checked{% endif %} required>
                                        <label class="table-label" for="masa{{i}}">{{i}}</label>
                                    </div>
                                    {% endfor %}
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-warning w-100 mb-2 fw-bold">Salvează Modificările !</button>
                            <a href="javascript:history.back()" class="btn btn-secondary w-100">Anulează</a>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
