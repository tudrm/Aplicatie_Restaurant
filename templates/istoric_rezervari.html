<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Rezervarile mele</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("{{ url_for('static', filename = 'poza restaurant unsplash.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh; 
        }
    </style>
</head>
<body class="bg-light">
    
    <h1 class="container display-1 text-center text-white" style="text-shadow: 2px 2px 5px black;">Rezervarile mele</h1>

    <div class="container text-end">
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <div class="container mt-1">

        <div class="text-center mb-5">
            <a href="/rezervare" class="btn btn-primary w-25">Faceti o noua rezervare</a>
        </div>

        <table class = "table table-striped table-hover">
            <thead class="table-primary">
                <tr>
                    <th>Data</th>
                    <th>Ora</th>
                    <th>Numarul de persoane</th>  
                    <th>Sterge rezervarea</th>  
                </tr>
            </thead>
            <tbody>
                {% for r in rezervari_trimise %}
                <tr>
                    <td>{{ r.data }}</td>
                    <td>{{ r.ora }}</td>
                    <td>{{ r.numar_persoane }}</td>
                    <td>
                        <a href="/delete_rezervare/{{r.id_rezervare}}" class="btn btn-danger mt-5 w-25">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
