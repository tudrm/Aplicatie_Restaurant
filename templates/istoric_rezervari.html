<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Rezervarile mele</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("{{ url_for('static', filename = 'poza restaurant unsplash.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh; 
        }
    </style>
</head>
<body class="bg-light">
    
    <h1 class="container display-1 text-center text-white" style="text-shadow: 2px 2px 5px black;">Rezervarile mele</h1>

    <div class="container text-end">
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <div class="container mt-1">

        <div class="text-center mb-5">
            <a href="/rezervare" class="btn btn-primary w-25">Faceti o noua rezervare</a>
        </div>

        <form method="POST" class="row gx-3 gy-2 align-items-center mb-4 justify-content-center">
            <div class="col-auto">
                <select class="form-select" name="an" required>
                    <option value="" disabled selected>Alege Anul</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                    <option value="2027 ">2027</option>
                    <option value="2028">2028</option>
                </select>
            </div>
            <div class="col-auto">
                <select class="form-select" name="luna" required>
                    <option value="" disabled selected>Alege Luna</option>
                    <option value="01">Ianuarie</option>
                    <option value="02">Februarie</option>
                    <option value="03">Martie</option>
                    <option value="04">Aprilie</option>
                    <option value="05">Mai</option>
                    <option value="06">Iunie</option>
                    <option value="07">Iulie</option>
                    <option value="08">August</option>
                    <option value="09">Septembrie</option>
                    <option value="10">Octombrie</option>
                    <option value="11">Noiembrie</option>
                    <option value="12">Decembrie</option>
                </select>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-success fw-bold">Filtrează</button>
                <a href="/istoric_rezervari" class="btn btn-secondary">Arată toate</a>
            </div>
        </form>

        <table class = "table table-striped table-hover">
            <thead class="table-primary">
                <tr>
                    <th>Data</th>
                    <th>Ora</th>
                    <th>Masa</th>
                    <th>Numarul de persoane</th>  
                    <th>Sterge rezervarea</th>  
                </tr>
            </thead>
            <tbody>
                {% for r in rezervari_trimise %}
                <tr>
                    <td>{{ r.data }}</td>
                    <td>{{ r.ora }}</td>
                    <td>Masa {{ r.numar_masa }}</td>
                    <td>{{ r.numar_persoane }} Persoane</td>
                    <td>
                        <a href="/edit_rezervare/{{r.id_rezervare}}" class="btn btn-sm btn-warning w-100 mb-1 fw-bold">Editează</a>
                        <a href="/delete_rezervare/{{r.id_rezervare}}" class="btn btn-sm btn-danger w-100">Șterge</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
