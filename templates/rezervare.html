<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Rezervari</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("{{ url_for('static', filename = 'poza restaurant4 unsplash.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh; 
        }
    </style>
</head>
<body class="bg-light">
    
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="text-center mb-4">Faceti o rezervare</h3>

                        {% if eroare %}
                            <div class = "alert alert-danger text-center">
                                {{eroare}}
                            </div>
                        {% endif %}
                        
                        <form method="POST" action="/rezervare">
                            
                            <div class = "mb-3">
                                <label for="data" class="form-label">Data rezervarii</label>
                                <input type="date" class="form-control" id="data" name="data" required>
                            </div>
                            
                            <div class = "mb-3">
                                <label for="ora" class="form-label">Ora rezervarii</label>
                                <input type="time" class="form-control" id="ora" name="ora" step = "1800" required>
                            </div>

                            <div class = "mb-3">
                                <label for = "number" class = "form-label">Numarul de persoane</label>
                                <input type = "number" class = "form-control" id = "numar_persoane" name = "numar_persoane" required>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100">Trimite rezervarea !</button>

                            <a href="/istoric_rezervari" class="btn btn-secondary mt-3 w-100">Rezervarile tale</a>

                            <a href="/logout" class="btn btn-danger mt-3 w-100">Logout</a>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
